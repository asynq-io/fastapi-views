site_name: "FastAPI Views"
site_description: "FastAPI Class Views and other utils"
theme:
  name: "material"
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
repo_name: asynq-io/fastapi-views
repo_url: https://github.com/asynq-io/fastapi-views
nav:
  - "FastAPI Views": index.md
  - "Usage":
      - "Basic": usage/basic.md
      - "Viewset": usage/viewset.md
      - "Generics": usage/generics.md
      - "Filters": usage/filters.md
      - "Opentelemetry": usage/opentelemetry.md
      - "Server Side Events": usage/sse.md
      - "WebSockets": usage/websockets.md
  - "Reference":
      - "API Views": reference/views.md
      - "ViewSets": reference/viewsets.md
      - "Generic Views": reference/generics.md
      - "Exceptions": reference/exceptions.md
      - "Models": reference/models.md
      - "Filters": reference/filters.md
      - "Pagination": reference/pagination.md
      - "Decorators": reference/decorators.md
      - "WebSockets": reference/websockets.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            show_signature_annotations: true
            docstring_style: sphinx
